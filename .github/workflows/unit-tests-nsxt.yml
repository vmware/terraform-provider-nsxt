---
name: Unit Tests (nsxt)

on:
  pull_request:
    paths:
      - 'nsxt/**'
      - 'mocks/**'
      - '.github/workflows/unit-tests-nsxt.yml'
  push:
    branches:
      - master
      - 'branch_*'
      - 'release-*'
    paths:
      - 'nsxt/**'
      - 'mocks/**'
      - '.github/workflows/unit-tests-nsxt.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Run unit tests
        run: |
          set -euo pipefail
          # Only the root nsxt package (not nsxt/metadata — see metadata-test.yml).
          go test ./nsxt -tags=unittest \
            -run='^(TestMock.*Nsxt.*|TestUnitNsxt_.*)' \
            -coverpkg=./nsxt \
            -coverprofile=coverage.out
          total_line=$(go tool cover -func=coverage.out | grep '^total:' || true)
          pct=$(echo "$total_line" | grep -oE '[0-9]+\.[0-9]+%' | tail -1)
          {
            echo "## Unit test coverage"
            echo ""
            echo "Merged coverage for \`-coverpkg=./nsxt\`: **${pct:-n/a}**"
            echo ""
            echo '```'
            echo "$total_line"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=nsxt unit test coverage::${pct:-n/a}"
