---
name: Unit Tests (nsxt)

on:
  push:
    paths:
      - 'nsxt/**'
      - '.github/workflows/unit-tests-nsxt.yml'
  pull_request:
    paths:
      - 'nsxt/**'
      - '.github/workflows/unit-tests-nsxt.yml'

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Run unit tests
        run: |
          set -euo pipefail
          go test ./nsxt/... -tags=unittest \
            -run='^(TestMock.*Nsxt.*|TestUnitNsxt_.*)' \
            -coverpkg=./nsxt/... \
            -coverprofile=coverage.out
          total_line=$(go tool cover -func=coverage.out | grep '^total:' || true)
          pct=$(echo "$total_line" | grep -oE '[0-9]+\.[0-9]+%' | tail -1)
          {
            echo "## Unit test coverage"
            echo ""
            echo "Merged coverage for \`-coverpkg=./nsxt/...\`: **${pct:-n/a}**"
            echo ""
            echo '```'
            echo "$total_line"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=nsxt unit test coverage::${pct:-n/a}"
